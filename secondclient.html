<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
<title>Desktop Stream — 視聴</title>
<style>
  /* 再配信の視聴専用クライアント。
     URLの ?room=<ベース32文字><部屋数+1の3桁> から部屋数を割り出し、
     001から順に空き部屋を探して入室する。 */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #0d1116; color: #e6e8ea;
    font-family: "SF Mono", "Cascadia Code", Consolas, "Noto Sans Mono CJK JP", monospace;
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 10px; flex: none;
    padding: 8px 14px;
    padding-left: calc(14px + env(safe-area-inset-left));
    padding-right: calc(14px + env(safe-area-inset-right));
    padding-top: calc(8px + env(safe-area-inset-top));
    border-bottom: 1px solid #1e242b; background: #11151a;
  }
  header h1 { font-size: 13px; font-weight: 700; letter-spacing: .08em; color: #cfd6dd; }
  #dot { width: 10px; height: 10px; border-radius: 50%; background: #555; flex: none; }
  #dot.ok { background: #2ecf8e; } #dot.warn { background: #e8b93c; } #dot.err { background: #e05252; }
  #status { font-size: 12px; color: #9aa4b0; margin-left: auto; text-align: right; }

  #app {
    flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 10px;
    padding: 10px;
    padding-left: calc(10px + env(safe-area-inset-left));
    padding-right: calc(10px + env(safe-area-inset-right));
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .stage {
    position: relative; flex: none; width: 100%; aspect-ratio: 16/9;
    background: #000; border-radius: 8px; overflow: hidden;
  }
  video { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
  #unmute {
    flex: none;
    padding: 6px 10px; min-height: 34px; font: inherit; font-size: 12px; color: #e6e8ea;
    background: #161b21; border: 1px solid #2a323b; border-radius: 6px;
    cursor: pointer; touch-action: manipulation; display: none;
  }
  #unmute.on { display: inline-block; }
  #unmute:active { background: #232c36; }
  #retry {
    position: absolute; left: 50%; top: 62%; transform: translate(-50%,-50%);
    padding: 10px 16px; font: inherit; font-size: 13px; color: #e6e8ea;
    background: rgba(28,58,46,.9); border: 1px solid #2f5a46; border-radius: 8px;
    cursor: pointer; touch-action: manipulation; display: none;
  }
  #retry.on { display: block; }
  #soundOnly {
    position: absolute; inset: 0; display: none;
    font-size: 20px; font-weight: 700; letter-spacing: .1em; color: #cfd6dd;
    background: #0d1116; pointer-events: none;
    align-items: center; justify-content: center;
  }
  /* JSで display を "" にすると下記のflexが効く */
  #soundOnly:not([style*="none"]) { display: flex; }
  #ovMsg {
    position: absolute; left: 0; right: 0; top: 38%; text-align: center;
    color: #8a93a0; font-size: 13px; padding: 0 16px; pointer-events: none;
  }

  /* コメント欄 */
  #cmWrap { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 8px; }
  #comments {
    flex: 1; min-height: 0; overflow: auto; padding: 8px 10px;
    background: #0a0d10; border: 1px solid #1e242b; border-radius: 8px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .cm { font-size: 13px; line-height: 1.5; word-break: break-word; }
  .cm .meta { color: #7f8b98; margin-right: 6px; font-size: 11px; }
  #cmForm { display: flex; gap: 6px; flex: none; }
  #cmColor {
    width: 44px; height: 44px; flex: none; padding: 2px;
    background: #0d1116; border: 1px solid #2a323b; border-radius: 8px; cursor: pointer;
  }
  #cmName {
    width: 90px; flex: none; background: #0d1116; border: 1px solid #2a323b; color: #e6e8ea;
    padding: 8px; border-radius: 8px; font: inherit; font-size: 16px;
  }
  #cmText {
    flex: 1; min-width: 0; background: #0d1116; border: 1px solid #2a323b; color: #e6e8ea;
    padding: 8px; border-radius: 8px; font: inherit; font-size: 16px;
  }
  #cmSend {
    flex: none; padding: 8px 14px; min-height: 44px; font: inherit; font-size: 13px;
    background: #1c3a2e; color: #dff3e8; border: 1px solid #2f5a46; border-radius: 8px;
    cursor: pointer; touch-action: manipulation;
  }
  #cmSend:disabled, #cmText:disabled { opacity: .45; }
  #cmSend:active:not(:disabled) { background: #234a3a; }

  /* 縦画面: プレーヤー高さを画面の42%までに抑える。
     キーボード表示時は interactive-widget=resizes-content により dvh が縮むため、
     プレーヤーが自動で小さくなり、入力欄とともに画面内に収まる */
  @media (orientation: portrait), (max-width: 599px) {
    .stage { max-height: 42dvh; }
    #comments { min-height: 60px; }
  }
  /* 横画面: プレーヤー左、コメント右 */
  @media (orientation: landscape) and (min-width: 600px) {
    #app { flex-direction: row; }
    .stage { flex: 0 1 auto; width: auto; height: 100%; max-height: 100%; max-width: 62%; }
    #cmWrap { flex: 1 1 300px; min-width: 260px; }
  }
  /* プレーヤー下の操作行 */
  /* プレーヤー下の操作行: 2行2列(左列=スライダー / 右列=ボタン) */
  #vrow {
    display: grid; grid-template-columns: 1fr auto;
    align-items: center; gap: 8px 10px; padding: 2px 0 8px;
  }
  #vrow #fsBtn, #vrow #unmute {
    flex: none; min-height: 36px; padding: 6px 12px; font: inherit; font-size: 13px;
    background: #161b21; color: #e6e8ea; border: 1px solid #2a323b; border-radius: 6px;
    cursor: pointer; touch-action: manipulation; white-space: nowrap;
  }
  /* 音量バランス: 動画音声(PC音声)と配信者マイクの2本 */
  .volgrp { display: flex; align-items: center; gap: 5px; min-width: 0; }
  .volgrp .vlabel { font-size: 11px; color: #9aa4b0; flex: none; }
  .volgrp input[type="range"] { flex: 1; min-width: 0; accent-color: #2ecf8e; }
  /* 配信タイトル: プレーヤー下部に重ねて表示。プレーヤーをタップで表示/非表示 */
  #bTitle {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 4;
    padding: 18px 12px 8px;
    background: linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,0));
    font-size: 13px; font-weight: 700; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    pointer-events: none;
  }
  #bTitle:empty { display: none; }
  .stage.hide-title #bTitle { display: none; }
  /* 全画面から戻るボタン: 全画面中のみ表示 */
  #fsExit {
    position: absolute; top: 8px; right: 8px; z-index: 5; display: none;
    min-height: 36px; padding: 6px 12px; font: inherit; font-size: 13px; color: #e6e8ea;
    background: rgba(13,17,22,.72); border: 1px solid rgba(58,68,80,.85); border-radius: 6px;
    cursor: pointer; touch-action: manipulation; backdrop-filter: blur(2px);
  }
  .stage:fullscreen #fsExit { display: block; }
  .stage:-webkit-full-screen #fsExit { display: block; }
  /* コメントのアバター(画像 or 頭文字の丸) */
  .cm-av {
    width: 20px; height: 20px; border-radius: 50%; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #0d1116; overflow: hidden;
    vertical-align: middle; border: none; padding: 0; cursor: default;
  }
  .cm-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #myAv { width: 44px; height: 44px; cursor: pointer; font-size: 18px; background: #8a93a0; }
  .cm .cm-av { margin-right: 6px; }
  .cm-host { color: #ffd479 !important; font-weight: 700; }
  .ng-icon-row { display: flex; align-items: center; gap: 10px; }
  .ng-icon-row button#ngIconBtn {
    flex: 1; min-height: 40px; padding: 8px; font: inherit; font-size: 13px;
    background: #161b21; color: #cfd6dd; border: 1px solid #2a323b; border-radius: 8px;
    cursor: pointer; touch-action: manipulation;
  }
  #ngIconPrev { width: 40px; height: 40px; font-size: 16px; background: #8a93a0; }
  /* ユーザー名ゲート */
  #nameGate {
    position: fixed; inset: 0; z-index: 100; background: rgba(9,12,15,.92);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .ng-box {
    width: 100%; max-width: 340px; background: #11151a; border: 1px solid #2a323b;
    border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px;
  }
  .ng-title { font-size: 15px; font-weight: 700; color: #cfd6dd; text-align: center; }
  #ngName {
    background: #0d1116; border: 1px solid #2a323b; color: #e6e8ea;
    padding: 10px; border-radius: 8px; font: inherit; font-size: 16px;
  }
  #ngGo {
    padding: 12px; min-height: 44px; font: inherit; font-size: 14px; font-weight: 700;
    background: #1c3a2e; color: #dff3e8; border: 1px solid #2f5a46; border-radius: 8px;
    cursor: pointer; touch-action: manipulation;
  }
  #ngGo:active { background: #234a3a; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<header>
  <span id="dot"></span>
  <h1>DESKTOP STREAM 視聴</h1>
  <span id="status" role="status" aria-live="polite">準備中…</span>
</header>

<!-- 視聴前のユーザー名入力ゲート: 名前を入れるまで視聴を開始しない -->
<div id="nameGate">
  <div class="ng-box">
    <div class="ng-title" id="ngTitle">ユーザー名を入力してください</div>
    <input id="ngName" type="text" maxlength="20" placeholder="名前" autocomplete="nickname" />
    <input id="ngPass" type="text" maxlength="20" placeholder="合言葉" style="display:none" />
    <div class="ng-icon-row">
      <button id="ngIconBtn" type="button">アイコンを選ぶ(任意)</button>
      <span id="ngIconPrev" class="cm-av"></span>
    </div>
    <input id="ngIconFile" type="file" accept="image/*" style="display:none" />
    <button id="ngGo">視聴をはじめる</button>
  </div>
</div>

<div id="app">
  <div class="stage">
    <video id="player" autoplay playsinline muted></video>
    <div id="ovMsg">配信を探しています…</div>
    <div id="soundOnly">♪ Sound Only</div>
    <div id="bTitle"></div>
    <button id="fsExit" aria-label="全画面を終了">✕ 全画面を終了</button>
    <button id="retry">↻ もう一度さがす</button>
  </div>
  <div id="cmWrap">
    <div id="vrow">
      <span class="volgrp"><span class="vlabel">🎬動画</span><input id="volDesk" type="range" min="0" max="100" value="30" aria-label="動画音声の音量" /></span>
      <button id="unmute">🔇 音声ON</button>
      <span class="volgrp"><span class="vlabel">🎙配信者マイク</span><input id="volMic" type="range" min="0" max="100" value="100" aria-label="配信者マイクの音量" /></span>
      <button id="fsBtn" aria-label="全画面表示">⛶ 全画面</button>
    </div>
    <div id="comments" aria-label="コメント一覧"></div>
    <div id="cmForm">
      <button id="myAv" type="button" class="cm-av" aria-label="アイコンを変更" title="アイコンを変更"></button>
      <input id="avFile" type="file" accept="image/*" style="display:none" />
      <input id="cmColor" type="color" title="コメントの色" aria-label="コメントの色" />
      <input id="cmName" type="text" placeholder="名前" maxlength="20" />
      <input id="cmText" type="text" placeholder="コメントを入力" maxlength="200" disabled />
      <button id="cmSend" disabled>送信</button>
    </div>
  </div>
</div>

<script>
"use strict";
const AYAME_URL = "wss://ayame-labo.shiguredo.app/signaling";
const $ = (id) => document.getElementById(id);
const video = $("player");

// ---- URLクエリから ベースID と 部屋数 を割り出す ----
// room = <ベース(32文字)> + <部屋数+1 の3桁>。例: 末尾011 → 部屋数10(001〜010を探す)
const roomParam = (new URLSearchParams(location.search).get("room") || "").trim();
let base = "", roomCount = 0;
if (roomParam.length > 3 && /^\d{3}$/.test(roomParam.slice(-3))) {
  base = roomParam.slice(0, -3);
  roomCount = parseInt(roomParam.slice(-3), 10) - 1;
}

let ws = null, pc = null, dc = null;
let joinedRoom = "";
let ended = false;

function pad3(n){ return String(n).padStart(3, "0"); }
function setStatus(text, cls){
  $("status").textContent = text;
  $("dot").className = cls || "";
}
function setOverlay(text){
  $("ovMsg").textContent = text || "";
  $("ovMsg").style.display = text ? "" : "none";
}
function enableComment(on){
  $("cmText").disabled = !on;
  $("cmSend").disabled = !on;
}

// ---- 入室スキャン: 001から順に試す ----
async function scan(){
  if (!base || roomCount < 1){
    setStatus("URLが不正です", "err");
    setOverlay("視聴用URLが正しくありません(roomパラメータを確認してください)");
    return;
  }
  ended = false;
  gotEnd = false;
  $("retry").classList.remove("on");
  let sawEmpty = false, sawFull = false;
  for (let i = 1; i <= roomCount; i++){
    setStatus(`さがしています… ${i}/${roomCount}`, "warn");
    setOverlay(`配信を探しています… (${i}/${roomCount})`);
    const res = await tryRoom(base + pad3(i));
    if (res === "joined"){ joinedRoom = base + pad3(i); return; }
    if (res === "empty") sawEmpty = true;
    if (res === "full") sawFull = true;
    // full=満員 / empty=配信側不在 → いずれも次の部屋を試す
  }
  if (sawFull && !sawEmpty){
    setStatus("満員です", "err");
    setOverlay("満員のため入室できませんでした。しばらくしてからお試しください。");
  } else {
    setStatus("配信が見つかりません", "err");
    setOverlay("配信が見つかりませんでした。配信中か、URLが正しいか確認してください。");
  }
  $("retry").classList.add("on");
}

// 1部屋を試す。joined: この部屋で接続開始(wsを引き継ぐ) / full / empty / error
function tryRoom(room){
  return new Promise((resolve) => {
    let done = false;
    const w = new WebSocket(AYAME_URL);
    const finish = (r, keepWs) => {
      if (done) return;
      done = true;
      clearTimeout(tm);
      if (!keepWs){ try { w.close(); } catch(e){} }
      resolve(r);
    };
    const tm = setTimeout(() => finish("error"), 5000);
    w.onopen = () => w.send(JSON.stringify({ type: "register", roomId: room, clientId: "dss-view-" + Date.now() }));
    w.onerror = () => finish("error");
    w.onclose = () => finish("error");
    w.onmessage = async (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
      if (m.type === "ping"){ w.send(JSON.stringify({ type: "pong" })); return; }
      if (m.type === "reject"){ finish("full"); return; }
      if (m.type === "accept"){
        if (!m.isExistClient){ finish("empty"); return; } // 配信側がこの部屋に居ない
        // 配信側が居る: この接続を本接続に昇格し、こちらからofferする
        ws = w;
        w.onclose = () => onEnded("接続が切れました");
        w.onerror = () => {};
        w.onmessage = onWsMessage;
        try { await startPeer(); finish("joined", true); }
        catch(e){ finish("error"); }
      }
    };
  });
}

async function onWsMessage(ev){
  let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
  try {
    if (m.type === "ping"){ ws.send(JSON.stringify({ type: "pong" })); return; }
    if (m.type === "answer"){ if (pc) await pc.setRemoteDescription({ type: "answer", sdp: m.sdp }); return; }
    if (m.type === "offer"){
      // 配信側からの再オファー(念のため対応)
      if (pc) { await pc.setRemoteDescription({ type: "offer", sdp: m.sdp });
        const ans = await pc.createAnswer();
        const asdp = tuneOpus(ans.sdp);
        await pc.setLocalDescription({ type: "answer", sdp: asdp });
        ws.send(JSON.stringify({ type: "answer", sdp: asdp })); }
      return;
    }
    if (m.type === "candidate" && m.ice){ if (pc){ try { await pc.addIceCandidate(m.ice); } catch(e){} } return; }
    if (m.type === "bye"){ onEnded("接続が切れました"); return; }
  } catch(e){}
}

// 受信するOpus音声の要求条件をSDPに追記する。
// fmtpは「受信側が何をどう送ってほしいか」の宣言なので、視聴側のSDPを
// 書き換えることで配信側エンコーダの動作(モノラル化・約32kbps・無音間引き)を避ける。
// 【音質ポリシー】このプロジェクトの音声はオリジナル音質のまま処理する。
// 音声は「配信者マイク」「PC音声」の2本のm-lineがあるため、
// 全てのOpusペイロードの全fmtp行(=全m-line)に適用すること。
// (以前は最初のfmtp行しか書き換えておらず、2本目がモノラル・低ビットレート・
//  DTX有効のままエンコードされて「こもった音」になる不具合があった)
function tuneOpus(sdp){
  const extra = "stereo=1;sprop-stereo=1;maxaveragebitrate=256000;usedtx=0";
  const pts = new Set();
  const rm = /a=rtpmap:(\d+) opus\/48000\/2/g;
  let m;
  while ((m = rm.exec(sdp))) pts.add(m[1]);
  for (const pt of pts){
    if (sdp.indexOf("a=fmtp:" + pt + " ") !== -1){
      // 既存のfmtp行(各m-lineに1行ずつある)全てに追記する
      const fre = new RegExp("a=fmtp:" + pt + " ([^\\r\\n]*)", "g");
      sdp = sdp.replace(fre, (mm, p) => "a=fmtp:" + pt + " " + p + ";" + extra);
    } else {
      // fmtp行が無い場合はrtpmap行(各m-lineに1行ずつある)の直後に挿入する
      const rre = new RegExp("(a=rtpmap:" + pt + " opus/48000/2)", "g");
      sdp = sdp.replace(rre, "$1\r\na=fmtp:" + pt + " " + extra);
    }
  }
  return sdp;
}

async function startPeer(){
  pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
  pc.onicecandidate = (e) => { if (e.candidate && ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "candidate", ice: e.candidate })); };
  pc.ontrack = (e) => {
    if (e.track.kind === "video"){
      // 映像だけをvideo要素へ。音声はWeb Audio側で個別に鳴らす(音量バランス用)。
      // Web Audio非対応環境では音声トラックが先にsrcObjectへ入ることがあるため保持する。
      const cur = video.srcObject;
      if (cur && cur.getVideoTracks && cur.getVideoTracks().length === 0){
        cur.addTrack(e.track);
      } else {
        video.srcObject = new MediaStream([e.track]);
      }
    } else {
      wireAudioTrack(e.transceiver ? e.transceiver.mid : null, e.track);
    }
    setOverlay("");
    $("unmute").classList.add("on");
    if (gateOpen()){
      // 先行入室中: 受信はするが再生はしない(名前入力後にngGoで再生を開始する)
      try { video.pause(); } catch(err){}
    } else {
      startSoundOnlyWatch();
    }
  };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === "connected"){
      setStatus("視聴中", "ok");
      retryCount = 0; // 接続できたらリトライ回数を戻す
      acquireViewLock();
    }
    if (pc.connectionState === "failed" || pc.connectionState === "closed") onEnded("接続が切れました");
  };
  pc.addTransceiver("video", { direction: "recvonly" });
  // 音声は「配信者マイク」「PC音声(動画音声)」の2トラックを別々に受ける
  pc.addTransceiver("audio", { direction: "recvonly" });
  pc.addTransceiver("audio", { direction: "recvonly" });
  dc = pc.createDataChannel("comment");
  dc.onopen = () => {
    enableComment(true);
    // 名前・アイコン・合言葉を配信者へ通知する(合言葉が必要な配信では検証される)。
    // 名前入力ゲート表示中(先行入室)は名前を空+pendingで送り、入力後に type:"name" で更新する。
    const pending = gateOpen();
    const nm = pending ? "" :
      ($("cmName").value.trim() || localStorage.getItem("dss_view_name") || "名無し").slice(0, 20);
    try {
      dc.send(JSON.stringify({
        type: "hello",
        name: nm,
        pending,
        icon: myIcon(),
        pass: localStorage.getItem("dss_view_pass") || "",
      }));
    } catch(e){}
  };
  dc.onclose = () => enableComment(false);
  dc.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    if (m.type === "comment") addComment(m.name, m.text, m.ts, m.color, m.icon, m.host);
    if (m.type === "audiomap"){
      // 配信側からの「どのmidがマイク/PC音声か」の対応表
      audioMap = { mic: (m.mic != null ? String(m.mic) : null), desk: (m.desk != null ? String(m.desk) : null) };
      applyAudioGains();
    }
    if (m.type === "welcome"){
      // タイトル表示と、途中参加でも読めるようにコメント履歴を反映
      const t = String(m.title || "").slice(0, 40);
      $("bTitle").textContent = t;
      if (t) document.title = t + " - 視聴中";
      if (Array.isArray(m.list)){
        $("comments").innerHTML = "";
        for (const c of m.list) addComment(c.name, c.text, c.ts, c.color, c.icon, c.host);
      }
    }
    if (m.type === "end"){
      gotEnd = true;
      onEnded("配信は終了しました", true);
    }
    if (m.type === "badpass"){
      gotEnd = true;
      onEnded("", true);
      showGate("この配信には合言葉が必要です", true);
    }
  };
  const offer = await pc.createOffer();
  const sdp = tuneOpus(offer.sdp);
  await pc.setLocalDescription({ type: "offer", sdp });
  ws.send(JSON.stringify({ type: "offer", sdp }));
}

// noRetry=true: 配信終了・合言葉不一致など、自動再接続すべきでない切断
// 受信映像がほぼ真っ黒(=配信側が静止画未選択などで無映像)なら "Sound Only" を表示する。
let soundOnlyTimer = null, soundCanvas = null;
function startSoundOnlyWatch(){
  if (soundOnlyTimer) return;
  soundCanvas = document.createElement("canvas");
  soundCanvas.width = 40; soundCanvas.height = 24;
  soundOnlyTimer = setInterval(() => {
    if (!video.videoWidth){ return; }
    try {
      const ctx = soundCanvas.getContext("2d");
      ctx.drawImage(video, 0, 0, 40, 24);
      const d = ctx.getImageData(0, 0, 40, 24).data;
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) sum += d[i] + d[i+1] + d[i+2];
      const avg = sum / (d.length / 4 * 3); // 0..255
      const dark = avg < 8;
      $("soundOnly").style.display = dark ? "" : "none";
    } catch(e){ /* CORS等で読めない場合は判定しない */ }
  }, 700);
}
function stopSoundOnlyWatch(){
  if (soundOnlyTimer){ clearInterval(soundOnlyTimer); soundOnlyTimer = null; }
  $("soundOnly").style.display = "none";
}

function onEnded(msg, noRetry){
  if (ended) return;
  ended = true;
  enableComment(false);
  releaseViewLock();
  try { pc && pc.close(); } catch(e){}
  try { ws && ws.close(); } catch(e){}
  pc = null; ws = null; dc = null;
  video.srcObject = null;
  clearAudioNodes();
  $("unmute").classList.remove("on");
  stopSoundOnlyWatch();
  if (noRetry || gotEnd){
    setStatus("終了", "err");
    if (msg) setOverlay(msg);
    $("retry").classList.add("on");
    return;
  }
  // 事故切断: 自動で再接続を試みる(間隔を広げながら最大8回)
  retryCount++;
  if (retryCount > 8){
    setStatus("切断", "err");
    setOverlay("再接続できませんでした");
    $("retry").classList.add("on");
    return;
  }
  const wait = Math.min(15000, 2000 * retryCount);
  setStatus(`再接続します… (${retryCount}回目)`, "warn");
  setOverlay(msg + "。自動で再接続します…");
  clearTimeout(retryTimer);
  retryTimer = setTimeout(scan, wait);
}
let gotEnd = false, retryCount = 0, retryTimer = null;

// 視聴中の画面スリープ防止
let viewLock = null;
async function acquireViewLock(){
  try { if ("wakeLock" in navigator) viewLock = await navigator.wakeLock.request("screen"); } catch(e){}
}
function releaseViewLock(){ try { if (viewLock) viewLock.release(); } catch(e){} viewLock = null; }
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && pc && pc.connectionState === "connected") acquireViewLock();
});

// ---- コメント ----
$("cmName").value = localStorage.getItem("dss_view_name") || "";
// コメント色: 保存が無ければパレットからクライアントが自動選択する
const CM_PALETTE = ["#7fd1ff", "#ffd479", "#a5f3b4", "#ff9db0", "#d3b4ff", "#ffb47f", "#8ce8dc", "#f0ef8a"];
(function(){
  let c = localStorage.getItem("dss_view_color");
  if (!/^#[0-9a-fA-F]{6}$/.test(c || "")){
    c = CM_PALETTE[Math.floor(Math.random() * CM_PALETTE.length)];
    localStorage.setItem("dss_view_color", c);
  }
  $("cmColor").value = c;
})();
$("cmColor").addEventListener("change", () => localStorage.setItem("dss_view_color", $("cmColor").value));
function validIcon(v){
  v = String(v || "");
  return (v.startsWith("data:image/") && v.length < 20000) ? v : "";
}
function avatarEl(name, color, icon, host){
  const av = document.createElement("span");
  av.className = "cm-av";
  const ic = validIcon(icon);
  if (ic){
    const img = document.createElement("img");
    img.src = ic;
    av.appendChild(img);
  } else {
    av.style.background = host ? "#ffd479" : (/^#[0-9a-fA-F]{6}$/.test(color || "") ? color : "#8a93a0");
    av.textContent = (name || "?").slice(0, 1);
  }
  return av;
}
function addComment(name, text, ts, color, icon, host){
  name = String(name || "名無し").slice(0, 20);
  text = String(text || "").slice(0, 200);
  if (!text.trim()) return;
  const box = $("comments");
  const div = document.createElement("div");
  div.className = "cm";
  div.appendChild(avatarEl(name, color, icon, host));
  const meta = document.createElement("span");
  meta.className = "meta" + (host ? " cm-host" : "");
  meta.textContent = new Date(ts || Date.now()).toLocaleTimeString() + " " + name;
  const body = document.createElement("span");
  body.textContent = text; // textContentで挿入(HTMLとして解釈させない)
  if (!host && /^#[0-9a-fA-F]{6}$/.test(color || "")){ meta.style.color = color; body.style.color = color; }
  div.appendChild(meta); div.appendChild(body);
  box.insertBefore(div, box.firstChild); // 最新コメントを上に表示
  while (box.childElementCount > 200) box.removeChild(box.lastChild);
  box.scrollTop = 0;
}
function sendComment(){
  const text = $("cmText").value.trim();
  if (!text || !dc || dc.readyState !== "open") return;
  const name = $("cmName").value.trim().slice(0, 20) || "名無し";
  localStorage.setItem("dss_view_name", name);
  // 自分のコメントも配信側から全員へ中継されて戻ってくるので、ここでは表示しない
  dc.send(JSON.stringify({ type: "comment", name, text, color: $("cmColor").value, icon: myIcon() }));
  $("cmText").value = "";
  // 連投防止: 送信後1.5秒は無効化(配信側でも同じ間隔で制限される)
  $("cmSend").disabled = true;
  setTimeout(() => { if (dc && dc.readyState === "open") $("cmSend").disabled = false; }, 1500);
}
$("cmSend").onclick = sendComment;
$("cmText").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing) sendComment(); });

// ---- 音声再生: 受信した2本の音声トラック(マイク/PC音声)をWeb Audioで個別に鳴らす ----
// 【音質ポリシー】このプロジェクトの音声はオリジナル音質のまま処理する。
// 加工(フィルター・ノイズ抑制等)は追加しない。Web Audioはトラックごとの
// 音量(ゲイン)調整だけに使う。
// 音量バランスは「🎬動画(PC音声)」「🎙配信者マイク」の2本のスライダーで調整する。
// 既定はマイクの方が大きい(配信者マイク100% / 動画30%)。
let actx = null;                 // AudioContext(初回のトラック受信時に生成)
let audioMap = null;             // {mic, desk}: 配信側から届くmid対応表
const audioNodes = new Map();    // mid -> { track, gain, el }
let masterMuted = true;          // 自動再生制限のためミュートで開始

function volPref(key, defVal){
  const v = parseInt(localStorage.getItem(key), 10);
  return Number.isFinite(v) ? Math.max(0, Math.min(100, v)) : defVal;
}
$("volDesk").value = volPref("dss_view_vol_desk", 30); // 既定: 動画30% / 配信者マイク100%(マイクを大きく)
$("volMic").value  = volPref("dss_view_vol_mic", 100);

function ensureAudioCtx(){
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ actx = null; }
  return actx;
}
// 受信音声トラックをWeb Audioへ接続する。midごとにゲインノードを持つ。
function wireAudioTrack(mid, track){
  mid = (mid != null) ? String(mid) : ("t" + audioNodes.size);
  if (audioNodes.has(mid)) return;
  const ctx = ensureAudioCtx();
  const st = new MediaStream([track]);
  // Safari対策: リモート音声トラックはメディア要素に接続しないと
  // Web Audioへサンプルが流れないことがあるため、ミュートした<audio>を噛ませる
  const el = document.createElement("audio");
  el.muted = true; el.autoplay = true;
  el.srcObject = st;
  el.play && el.play().catch(() => {});
  if (!ctx){
    // Web Audioが使えない環境: video要素に音声も入れて従来通り鳴らす(バランス調整不可)
    try {
      const ms = video.srcObject || new MediaStream();
      ms.addTrack(track);
      video.srcObject = ms;
    } catch(e){}
    return;
  }
  try {
    const src = ctx.createMediaStreamSource(st);
    const gain = ctx.createGain();
    src.connect(gain).connect(ctx.destination);
    audioNodes.set(mid, { track, gain, el });
    applyAudioGains();
  } catch(e){}
}
// スライダー値・ミュート状態・mid対応表から各トラックのゲインを決める
function applyAudioGains(){
  const vd = $("volDesk").value / 100;
  const vm = $("volMic").value / 100;
  for (const [mid, n] of audioNodes){
    let v;
    if (audioMap && audioMap.mic === mid) v = vm;
    else if (audioMap && audioMap.desk === mid) v = vd;
    else v = vd; // 対応表が未着/旧配信(ミックス済1本)は動画スライダーで調整
    n.gain.gain.value = masterMuted ? 0 : v;
  }
}
function clearAudioNodes(){
  for (const [, n] of audioNodes){
    try { n.gain.disconnect(); } catch(e){}
    try { n.el.srcObject = null; } catch(e){}
  }
  audioNodes.clear();
  audioMap = null;
}
$("volDesk").addEventListener("input", () => { localStorage.setItem("dss_view_vol_desk", $("volDesk").value); applyAudioGains(); });
$("volMic").addEventListener("input", () => { localStorage.setItem("dss_view_vol_mic", $("volMic").value); applyAudioGains(); });

// ---- 音声ON(自動再生制限のためミュートで開始) ----
$("unmute").onclick = () => {
  masterMuted = !masterMuted;
  if (!masterMuted){
    if (actx && actx.state === "suspended") actx.resume().catch(() => {});
    video.play().catch(() => {});
    // Web Audio非対応フォールバック時はvideo側のミュートも解除する
    video.muted = audioNodes.size > 0;
  } else {
    video.muted = true;
  }
  applyAudioGains();
  $("unmute").textContent = masterMuted ? "🔇 音声ON" : "🔊 音声OFF";
};
$("retry").onclick = () => { $("retry").classList.remove("on"); retryCount = 0; scan(); };

// ---- 全画面 ----
function exitFs(){
  if (document.fullscreenElement || document.webkitFullscreenElement){
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}
$("fsBtn").onclick = () => {
  const st = document.querySelector(".stage");
  if (document.fullscreenElement || document.webkitFullscreenElement){
    exitFs();
  } else {
    (st.requestFullscreen || st.webkitRequestFullscreen).call(st);
  }
};
$("fsExit").onclick = (e) => { e.stopPropagation(); exitFs(); };

// ---- タイトル表示のトグル: プレーヤーをタップすると表示/非表示 ----
(function(){
  const st = document.querySelector(".stage");
  st.addEventListener("click", (e) => {
    // ボタン類のタップではトグルしない
    if (e.target.closest("button")) return;
    st.classList.toggle("hide-title");
  });
})();

// ---- アイコン(画像を48pxに縮小してdataURL保存) ----
function myIcon(){ return validIcon(localStorage.getItem("dss_view_icon") || ""); }
function setIconPreview(){
  for (const id of ["myAv", "ngIconPrev"]){
    const el = $(id);
    if (!el) continue;
    el.innerHTML = "";
    const ic = myIcon();
    if (ic){
      const img = document.createElement("img");
      img.src = ic;
      el.appendChild(img);
      el.style.background = "";
    } else {
      const nm = ($("cmName").value || localStorage.getItem("dss_view_name") || "?").trim();
      el.textContent = nm.slice(0, 1) || "?";
      el.style.background = $("cmColor") ? $("cmColor").value : "#8a93a0";
    }
  }
}
function loadIconFile(file){
  if (!file || !file.type.startsWith("image/")) return;
  const img = new Image();
  img.onload = () => {
    const c = document.createElement("canvas");
    c.width = 48; c.height = 48;
    const ctx = c.getContext("2d");
    // 中央を正方形に切り出して縮小
    const s = Math.min(img.width, img.height);
    ctx.drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, 48, 48);
    let url = c.toDataURL("image/jpeg", 0.8);
    if (url.length >= 20000) url = c.toDataURL("image/jpeg", 0.5);
    if (url.length < 20000){
      localStorage.setItem("dss_view_icon", url);
      setIconPreview();
    }
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
}
$("myAv").onclick = () => $("avFile").click();
$("avFile").addEventListener("change", (e) => { loadIconFile(e.target.files && e.target.files[0]); e.target.value = ""; });
$("ngIconBtn").onclick = () => $("ngIconFile").click();
$("ngIconFile").addEventListener("change", (e) => { loadIconFile(e.target.files && e.target.files[0]); e.target.value = ""; });
$("cmColor").addEventListener("change", setIconPreview);
setIconPreview();

// ---- ゲート表示(名前入力 / 合言葉要求時の再表示) ----
// ゲート表示中でも入室(Ayame接続)は先に試みる。映像は受信するが再生はしない。
function gateOpen(){ return $("nameGate").style.display !== "none"; }
function showGate(title, needPass){
  $("ngTitle").textContent = title || "ユーザー名を入力してください";
  $("ngPass").style.display = needPass ? "" : "none";
  $("ngName").value = localStorage.getItem("dss_view_name") || "";
  $("ngPass").value = localStorage.getItem("dss_view_pass") || "";
  $("nameGate").style.display = "";
  (needPass ? $("ngPass") : $("ngName")).focus();
}

// 名前が保存済みならすぐ視聴開始。未入力ならゲートで入力を求める。
// 合言葉不一致で戻された場合は showGate(…, true) で合言葉欄つきで再表示される。
$("ngGo").onclick = () => {
  const n = $("ngName").value.trim().slice(0, 20);
  if (!n){ $("ngName").focus(); return; }
  localStorage.setItem("dss_view_name", n);
  if ($("ngPass").style.display !== "none"){
    localStorage.setItem("dss_view_pass", $("ngPass").value.trim().slice(0, 20));
  }
  $("cmName").value = n;
  $("nameGate").style.display = "none";
  setIconPreview();
  if (pc && dc && dc.readyState === "open"){
    // 先行入室が成功済み: 再スキャンせず、名前を配信側へ通知して再生を開始する
    try {
      dc.send(JSON.stringify({ type: "name", name: n, icon: myIcon(),
                               pass: localStorage.getItem("dss_view_pass") || "" }));
    } catch(e){}
    video.play().catch(() => {});
    startSoundOnlyWatch();
    return;
  }
  // まだ入室できていない(満員・不在・合言葉不一致で切断など): 再チャレンジ
  gotEnd = false; retryCount = 0;
  scan();
};
$("ngName").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing) $("ngGo").click(); });
$("ngPass").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing) $("ngGo").click(); });
(function(){
  const saved = (localStorage.getItem("dss_view_name") || "").trim();
  if (saved){
    $("nameGate").style.display = "none";
    scan();
  } else {
    // 名前未入力でも先に入室だけ試みて席を確保する(映像は再生しない)。
    // 配信側には「ユーザー名未入力」として通知され、名前入力後に更新される。
    showGate("", false);
    scan();
  }
})();
</script>
